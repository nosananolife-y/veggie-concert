<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>源源的蔬菜音乐会 🎵</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#050e07;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;
  touch-action:none;
}
#wrap { position:relative; display:inline-block; line-height:0; }
canvas { display:block; border-radius:12px; }
.ov {
  position:absolute; inset:0; border-radius:12px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; padding:36px 24px;
  background:rgba(3,12,6,0.93);
  text-align:center;
}
.ov.hidden { display:none; }
.ov .big { font-size:3rem; line-height:1.1; }
.ov h1 {
  font-family:'Fredoka One',cursive;
  font-size:1.8rem; color:#6dffaa;
  line-height:1.2;
}
.ov h1.red { color:#ff9e7d; }
.ov p { color:#aae8b8; font-size:0.92rem; line-height:1.9; max-width:260px; }
.big-score {
  font-family:'Fredoka One',cursive;
  font-size:1.6rem; color:#ffe87d;
}
.btn {
  background:#2ea84a;
  color:#fff; border:none;
  padding:12px 32px; border-radius:50px;
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.95rem; font-weight:700;
  cursor:pointer; letter-spacing:0.05em;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div class="ov" id="oStart">
    <div class="big">🎵🥬</div>
    <h1>源源的蔬菜音乐会</h1>
    <p>用音符球打飞所有蔬菜砖块！<br>触屏左右滑动控制球拍</p>
    <button class="btn" id="btnStart">开始演出 🎤</button>
  </div>

  <div class="ov hidden" id="oWin">
    <div class="big">🎉🥬✨</div>
    <h1>演出大成功！</h1>
    <p>所有蔬菜都被打飞啦！<br>🌟 源源最棒了 🌟<br><span style="font-size:0.82rem;color:#7ddfaa;">来自朴朴的小礼物</span></p>
    <div class="big-score" id="winScore"></div>
    <button class="btn" id="btnWinRetry">再演一次 ↩</button>
  </div>

  <div class="ov hidden" id="oOver">
    <div class="big">😿</div>
    <h1 class="red">球球掉啦！</h1>
    <p>没关系的～<br>源源一定可以打完的！💪</p>
    <div class="big-score" id="overScore"></div>
    <button class="btn" id="btnOverRetry">再试一次 ↩</button>
  </div>
</div>

<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const W=480, H=640;
cvs.width=W; cvs.height=H;

function doResize(){
  const s=Math.min((innerWidth-8)/W,(innerHeight-8)/H,1);
  cvs.style.width=(W*s)+'px';
  cvs.style.height=(H*s)+'px';
}
doResize();
window.addEventListener('resize',doResize);

// Audio
let _ac;
function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function tone(freq,type,dur,vol,end){
  try{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.value=freq;
    if(end)o.frequency.exponentialRampToValueAtTime(end,a.currentTime+dur);
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur);
  }catch(e){}
}
const sfx={
  wall:  ()=>tone(280,'sine',0.07,0.18),
  pad:   ()=>tone(200,'sine',0.1,0.22,155),
  crack: ()=>tone(620+Math.random()*320,'triangle',0.1,0.22),
  thud:  ()=>tone(380,'sawtooth',0.1,0.18,260),
  win:   ()=>[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.3,0.24),i*110)),
  lose:  ()=>[360,280,200].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.2,0.2),i*140)),
};

// Brick data — bright colors now
const VDATA=[
  {name:'菠 菜', fg:'#c8ffcc', bg:'#228b32', bd:'#4ddd5a', hits:1},
  {name:'生 菜', fg:'#e8ffc8', bg:'#3aaa2a', bd:'#6de050', hits:1},
  {name:'白 菜', fg:'#1a3a1a', bg:'#a8e860', bd:'#d0ff80', hits:2},
  {name:'韭 菜', fg:'#d8ffda', bg:'#1a7a28', bd:'#40cc55', hits:1},
  {name:'空心菜',fg:'#ccffe8', bg:'#2a9a50', bd:'#55ddaa', hits:1},
  {name:'西兰花',fg:'#e8ffd8', bg:'#208040', bd:'#44cc70', hits:2},
];
const COLS=8,ROWS=6,BW=50,BH=22,BGAP=4;
const BX0=(W-(COLS*(BW+BGAP)-BGAP))/2;
const BY0=80;

let bricks=[],ball={},paddle={};
let score=0,lives=3,gameOn=false,rafId=null,particles=[];
let mouseX=W/2,touchX=null,keyL=false,keyR=false;

function mkBricks(){
  bricks=[];
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      bricks.push({
        x:BX0+c*(BW+BGAP),y:BY0+r*(BH+BGAP),
        ...VDATA[r],maxHits:VDATA[r].hits,alive:true
      });
}
function mkBall(){
  ball={x:W/2,y:H-90,vx:(Math.random()<0.5?1:-1)*3.8,vy:-5,r:9,trail:[]};
}
function mkPaddle(){
  paddle={x:W/2-50,y:H-46,w:100,h:14};
}

function startGame(){
  hide('oStart');hide('oWin');hide('oOver');
  score=0;lives=3;particles=[];
  mkBricks();mkBall();mkPaddle();
  gameOn=true;
  if(rafId)cancelAnimationFrame(rafId);
  loop();
}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

// Input
const wrap=document.getElementById('wrap');
wrap.addEventListener('mousemove',e=>{
  const r=cvs.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
});
cvs.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=cvs.getBoundingClientRect();
  touchX=(e.touches[0].clientX-r.left)*(W/r.width);
},{passive:false});
cvs.addEventListener('touchend',()=>touchX=null);
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')keyL=true;if(e.key==='ArrowRight')keyR=true;});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')keyL=false;if(e.key==='ArrowRight')keyR=false;});
document.getElementById('btnStart').onclick=startGame;
document.getElementById('btnWinRetry').onclick=startGame;
document.getElementById('btnOverRetry').onclick=startGame;

// RoundRect polyfill
function rr(x,y,w,h,r){
  ctx.beginPath();
  if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);}
  else{
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
  }
}

// Particles
function spawnParts(x,y,col){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,
      life:1,decay:0.04+Math.random()*0.04,r:2+Math.random()*3,c:col});
  }
}
function tickParts(){
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;}
}

// Stars
const STARS=Array.from({length:50},(_,i)=>({
  x:(i*137.508)%W,y:(i*97.321)%(H*0.5),
  r:i%6===0?1.5:0.7,a:0.2+(i%4)*0.15
}));

// Draw
function drawBG(){
  ctx.fillStyle='#0a1a0c';
  ctx.fillRect(0,0,W,H);
  for(const s of STARS){
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(160,255,180,${s.a})`;ctx.fill();
  }
}

function drawBricks(){
  for(const b of bricks){
    if(!b.alive)continue;
    const dmg=b.maxHits>1&&b.hits<b.maxHits;
    // Background
    ctx.fillStyle=dmg?'#1a2a1c':b.bg;
    rr(b.x,b.y,b.w,b.h,5);ctx.fill();
    // Border
    ctx.strokeStyle=dmg?'#445544':b.bd;
    ctx.lineWidth=1.5;
    rr(b.x,b.y,b.w,b.h,5);ctx.stroke();
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.12)';
    rr(b.x+4,b.y+2,b.w-8,4,2);ctx.fill();
    // Label
    ctx.fillStyle=dmg?'#667766':b.fg;
    ctx.font='bold 10px "Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.name,b.x+b.w/2,b.y+b.h/2);
    // Crack on damaged
    if(dmg){
      ctx.strokeStyle='rgba(255,220,80,0.7)';ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(b.x+b.w/2-4,b.y+3);
      ctx.lineTo(b.x+b.w/2+2,b.y+b.h/2);
      ctx.lineTo(b.x+b.w/2-2,b.y+b.h-3);
      ctx.stroke();
    }
  }
}

function drawParts(){
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.c;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBall(){
  // Trail
  for(let i=0;i<ball.trail.length;i++){
    const t=ball.trail[i],a=(i/ball.trail.length)*0.25;
    ctx.beginPath();ctx.arc(t.x,t.y,ball.r*0.55,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,255,140,${a})`;ctx.fill();
  }
  // Outer ring
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle='#80ff90';ctx.fill();
  // Inner
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r*0.65,0,Math.PI*2);
  ctx.fillStyle='#30aa50';ctx.fill();
  // Note
  ctx.fillStyle='#e8ffe8';
  ctx.font=`bold ${Math.round(ball.r*1.3)}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('♪',ball.x,ball.y+1);
}

function drawPaddle(){
  ctx.fillStyle='#2ecc50';
  rr(paddle.x,paddle.y,paddle.w,paddle.h,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.25)';
  rr(paddle.x+10,paddle.y+2,paddle.w-20,4,2);ctx.fill();
}

function drawHUD(){
  ctx.font='14px "Noto Sans SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle='#88ffaa';ctx.textBaseline='top';
  ctx.textAlign='left';ctx.fillText('得分  '+score,14,14);
  ctx.textAlign='right';ctx.fillText('🎤'.repeat(Math.max(0,lives))+'  ×'+lives,W-14,14);
  const rem=bricks.filter(b=>b.alive).length;
  ctx.textAlign='center';ctx.fillStyle='rgba(140,220,150,0.5)';
  ctx.font='11px sans-serif';ctx.fillText('剩余 '+rem+' 块',W/2,16);
}

// Collision
function circRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx,dy=cy-ny;return dx*dx+dy*dy<cr*cr;
}
function bounceAxis(cx,cy,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  return Math.abs(cx-nx)>Math.abs(cy-ny)?'x':'y';
}

function update(){
  const inp=touchX!==null?touchX:mouseX;
  paddle.x=inp-paddle.w/2;
  if(keyL)paddle.x-=7;if(keyR)paddle.x+=7;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));

  ball.trail.push({x:ball.x,y:ball.y});
  if(ball.trail.length>10)ball.trail.shift();
  ball.x+=ball.vx;ball.y+=ball.vy;

  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);sfx.wall();}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);sfx.wall();}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);sfx.wall();}

  if(ball.vy>0&&
     ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+paddle.h+6&&
     ball.x>=paddle.x-ball.r&&ball.x<=paddle.x+paddle.w+ball.r){
    ball.vy=-Math.abs(ball.vy);
    const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    ball.vx=hit*5.5;
    const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
    if(spd<4.2){ball.vx*=4.2/spd;ball.vy=-4.2;}
    if(spd>8.5){ball.vx*=8.5/spd;ball.vy*=8.5/spd;}
    sfx.pad();
  }

  if(ball.y-ball.r>H){
    lives--;
    if(lives<=0){
      gameOn=false;sfx.lose();
      setTimeout(()=>{
        document.getElementById('overScore').textContent='得分  '+score+'  分';
        show('oOver');
      },600);return;
    }
    mkBall();
  }

  for(const b of bricks){
    if(!b.alive)continue;
    if(circRect(ball.x,ball.y,ball.r,b.x,b.y,b.w,b.h)){
      const axis=bounceAxis(ball.x,ball.y,b.x,b.y,b.w,b.h);
      if(axis==='x')ball.vx=-ball.vx;else ball.vy=-ball.vy;
      b.hits--;
      if(b.hits<=0){
        b.alive=false;score+=b.maxHits*10;
        spawnParts(b.x+b.w/2,b.y+b.h/2,b.bd);
        sfx.crack();
      }else sfx.thud();
      break;
    }
  }

  if(bricks.every(b=>!b.alive)){
    gameOn=false;sfx.win();
    setTimeout(()=>{
      document.getElementById('winScore').textContent='最终得分  '+score+'  分 🏆';
      show('oWin');
    },700);
  }
  tickParts();
}

function loop(){
  update();
  drawBG();drawHUD();drawBricks();drawParts();drawPaddle();drawBall();
  if(gameOn)rafId=requestAnimationFrame(loop);
}

drawBG();mkBricks();mkPaddle();drawBricks();drawPaddle();drawHUD();
</script>
</body>
</html>
